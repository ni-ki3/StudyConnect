{% extends "base.html" %}

{% block content %}

<h2>{{ t("login") }}</h2>

<form method="POST">

    <label>{{ t("email") }}</label><br>
    <input type="email" name="email" required><br><br>

    <label>{{ t("password") }}</label><br>
    <input type="password" name="password" required><br><br>

    <button type="submit" class="btn">
        {{ t("signin") }}
    </button>

</form>

{% endblock %}
