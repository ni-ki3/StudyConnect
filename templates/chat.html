{% extends "base.html" %}

{% block content %}

<h2>💬 {{ t("your_chats") }}</h2>

{% if users %}

    <div class="card-container">

        {% for user in users %}

            <div class="card">

                {% if user.avatar %}
                    <img
                        src="{{ url_for('static', filename='avatars/' + user.avatar) }}"
                        class="avatar-image"
                        alt="{{ t('photo') }}"
                    >
                {% else %}
                    <div class="avatar small-avatar">
                        {{ user.username[0]|upper }}
                    </div>
                {% endif %}

                <h3>{{ user.username }}</h3>

                <a href="{{ url_for('chat_with', user_id=user.id) }}" class="btn">
                    {{ t("open_chat") }}
                </a>

            </div>

        {% endfor %}

    </div>

{% else %}

    <p>{{ t("no_chats") }}</p>

{% endif %}

{% endblock %}
